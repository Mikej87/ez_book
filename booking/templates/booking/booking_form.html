{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <h3>{% if object %}Edit{% else %}New{% endif %} Booking</h3>
        <form method="post" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Save Reservation</button>
        </form>
        <a href="{% url 'my_bookings' %}" class="d-block text-center mt-3 text-muted">Cancel</a>
    </div>
</div>
{% endblock %}
