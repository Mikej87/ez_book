{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Book | Restaurant Reservations</title>
    <!-- Bootstrap CSS (Req #5) -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <!-- Custom CSS (Req #4) -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; color: #ff5733 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">EZ Book</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
                <a class="nav-link" href="{% url 'menu' %}">Menu</a>
                {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'my_bookings' %}">My Bookings</a>
                    <a class="nav-link" href="{% url 'booking_create' %}">New Reservation</a>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}<button type="submit" class="btn btn-link nav-link">Logout</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>
     <!-- Bootstrap JS (Optional but recommended) -->
    <script src="https://cdn.jsdelivr.net"></script>
    
    <!-- Your Custom JS (Requirement #1) -->
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
